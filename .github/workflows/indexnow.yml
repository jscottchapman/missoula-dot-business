name: Ping IndexNow

on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Ping IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "missoula.business",
              "key": "21d004a6608b77811b0c8ad48fb92aa6",
              "keyLocation": "https://missoula.business/21d004a6608b77811b0c8ad48fb92aa6.txt",
              "urlList": [
                "https://missoula.business/",
                "https://missoula.business/llms.txt"
              ]
            }'
          echo ""
          echo "IndexNow ping sent"
